# Paper Curator Configuration

# 연구 관심사 (Claude API가 논문 필터링에 사용)
research_profile:
  lab: "HYU NLP Lab (Hanyang University)"
  homepage: "https://nlp.hanyang.ac.kr"
  interests:
    - "Dialogue Systems (task-oriented, chitchat, proactive conversational AI)"
    - "Retrieval-Augmented Generation (RAG, knowledge conflict, multi-hop reasoning)"
    - "Knowledge Unlearning in LLMs (localization, parameter attribution)"
    - "Multimodal & Omni-Modal Reasoning (cross-modal, multi-hop, financial)"
    - "LLM Evaluation and Benchmarking (confidence estimation, calibration)"
    - "LLM Confidence and Uncertainty (verbalized confidence, calibration)"
    - "Multilingual NLP (idioms, low-resource languages, cultural understanding)"
  recent_papers:
    # ACL 2026
    - "ADVICE: Answer-Dependent Verbalized Confidence Estimation (ACL 2026 Main)"
    - "OMHBench: Benchmarking Balanced and Grounded Omni-Modal Multi-Hop Reasoning (ACL 2026 Findings)"
    # ACL 2025
    - "FCMR: Financial Cross-Modal Reasoning (ACL 2025 Main)"
    # EMNLP 2025
    - "TACT: Beyond TOD and Chitchat - Proactive and Transition-Aware Agents (EMNLP 2025 Main)"
    - "MIDAS: Memorization or Reasoning? Idiom Understanding of LLMs (EMNLP 2025 Main)"
    - "Knowledge Unlearning: Localization vs Parameter Attribution (EMNLP 2025 Main)"
    - "MAGIC: Multi-Hop and Graph-Based RAG Benchmark (EMNLP 2025 Findings)"

# 소스 설정
sources:
  arxiv:
    categories:
      - "cs.CL"    # Computation and Language
      - "cs.AI"    # Artificial Intelligence
      - "cs.LG"    # Machine Learning
    max_papers_per_category: 30
  alphaxiv:
    url: "https://www.alphaxiv.org/"
  huggingface:
    url: "https://huggingface.co/papers"

# 추천 설정
recommendation:
  per_source: 10        # 소스당 추천 수
  hype_section: true    # Agent/trending 별도 섹션
  include_honorable_mentions: true

# 알림 설정
notifications:
  slack:
    enabled: false
    # webhook_url은 .env에서 관리
  notion:
    enabled: false
    # api_key와 database_id는 .env에서 관리

# 피드백 (사용자 피드백 반영)
feedback:
  prefer:
    - "RAG benchmarks and evaluation"
    - "dialogue systems"
    - "knowledge reasoning"
    - "LLM confidence, calibration, uncertainty estimation"
    - "omni-modal and cross-modal reasoning"
    - "multi-hop reasoning and benchmarks"
  avoid:
    - "computer vision (pure CV without NLP)"
    - "autonomous driving"
    - "3D generation"
    - "audio/speech only"
  extra_keywords:
    - "instruction tuning"
    - "preference learning"
    - "confidence estimation"
    - "calibration"
    - "verbalized uncertainty"
    - "omni-modal"
    - "proactive dialogue"
